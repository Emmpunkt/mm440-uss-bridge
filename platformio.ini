; MM440 USS Bridge — ESP32-C3 Super Mini
; Board: esp32-c3-devkitm-1 ist pinkompatibel zum C3 Super Mini

[env:esp32c3_supermini]
platform = espressif32@6.11.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; USB-CDC: Serielle Konsole läuft über den nativen USB des C3,
; UART0-Pins (GPIO20/21) bleiben damit frei für RS485.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Wall

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.4

; Upload über USB (Super Mini hat nativen USB, kein extra UART-Adapter nötig).
; 115200: der native USB-CDC des C3 verträgt das Umschalten auf 921600 nicht
; ("No serial data received") — über USB-CDC bringt hohe Baudrate eh nichts.
upload_speed = 115200
; --no-stub: der Flash-Stub bricht über den nativen USB-CDC des C3 die
; Verbindung ab ("Unable to verify flash chip connection") -> ROM-Loader nutzen.
upload_flags = --no-stub

; ----------------------------------------------------------------------
; OTA-Upload über WLAN (nach dem Bootstrap-USB-Flash):
;   pio run -e ota -t upload
; upload_port ggf. an die aktuelle DHCP-IP anpassen (oder <hostname>.local,
; ArduinoOTA meldet den Hostname via mDNS an).
; ----------------------------------------------------------------------
[env:ota]
extends = env:esp32c3_supermini
upload_protocol = espota
upload_port = 192.168.2.154
upload_flags = --auth=mm440ota
